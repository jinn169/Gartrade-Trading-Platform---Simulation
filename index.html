<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Platform</title>
    <style>
        .verification-warning {
            background-color: red;
            color: white;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            animation: fadeIn 1s;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>
    <h1>Trading Platform Simulation</h1>
    <div id="app"></div>
    <script>
        function checkVerification() {
            // Instead of alert, display a styled div
            const warningDiv = document.createElement('div');
            warningDiv.className = 'verification-warning';
            warningDiv.innerText = 'Verification Failed! Please check your input.';
            document.getElementById('app').appendChild(warningDiv);
        }

        // Example of how to call checkVerification
        // checkVerification();
    </script>
</body>
</html>
